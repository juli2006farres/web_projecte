<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuaris - Administració</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-usuaris.css">
</head>

<body>
    <div class="admin-panel" style="margin: 0; min-height: 90vh;">
        <div class="usuaris-header">
            <h2>Gestió d'Usuaris</h2>
            <button id="btn-add-user" class="btn-primary">+ Afegir Usuari</button>
        </div>

        <table class="usuaris-table">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Correu Electrònic</th>
                    <th>Rol</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody id="usuaris-body">
                <tr>
                    <td colspan="4" style="text-align:center; padding: 20px;">Carregant usuaris...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-usuaris.js"></script>
</body>

</html>
