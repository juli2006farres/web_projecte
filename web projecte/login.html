<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaTIC</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/config.js?v=v2"></script>
</head>

<body>
    <header>
        <div class="header-info">
            <h1>AgendaTIC</h1>
            <p>Inici de sessió</p>
        </div>
        <a href="index.html" class="back-icon" aria-label="Tornar a l'inici">
            🏠
        </a>
    </header>

    <main>
        <div class="login-container">
            <h2>Benvingut/da</h2>
            <div class="login-form">
                <p>Per accedir al sistema, si us plau inicia sessió amb el teu compte institucional o de Google.</p>
                <button type="button" class="btn-login" onclick="auth.login()">Inicia sessió amb Cognito</button>
                <div style="margin-top: 10px;">
                    <button type="button" class="btn-login" style="background-color: #4285F4;"
                        onclick="auth.login('Google')">Inicia sessió amb Google</button>
                </div>
            </div>
        </div>
    </main>
    <script src="js/auth.js?v=v2"></script>
</body>

</html>
