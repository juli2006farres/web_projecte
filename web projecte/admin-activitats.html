<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activitats - Administració</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-activitats.css">
</head>

<body>
    <div class="admin-panel" style="margin: 0; min-height: 90vh;">
        <div class="activitats-header">
            <h2>Afegir Nova Activitat</h2>
        </div>

        <form class="activitat-form" id="form-activitat">
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label for="nom-activitat">Nom de l'Activitat</label>
                    <input type="text" id="nom-activitat" placeholder="Ex: Curs de React" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="aula">Aula</label>
                    <select id="aula" required>
                        <option value="" disabled selected>Selecciona l'aula</option>
                        <option value="ATECA">Aula ATECA</option>
                        <option value="AGORA">Aula ÀGORA</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="data-activitat">Data</label>
                    <input type="date" id="data-activitat" required>
                </div>
                <div class="form-group">
                    <label for="hora-inici">Hora d'Inici</label>
                    <input type="time" id="hora-inici" required>
                </div>
                <div class="form-group">
                    <label for="hora-fi">Hora de Finalització</label>
                    <input type="time" id="hora-fi" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="responsable">Responsable</label>
                    <input type="text" id="responsable" placeholder="Nom del professor o responsable" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Guardar Activitat</button>
        </form>


    </div>
</body>

</html>
