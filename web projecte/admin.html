<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panell d'Administració - AgendaTIC</title>
    <!-- Utilitzarem l'estil principal i un específic per a l'admin -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="js/config.js?v=v3"></script>
    <script src="js/auth.js?v=v3"></script>
    <!-- 
     <script>
        // Check authentication before loading the rest of the page
        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isAuthenticated()) {
                console.log("No token found, redirecting to login...");
                auth.login(); // This will redirect to Cognito login
            }
        });
    </script>   
    -->
    
</head>

<body>
    <header>
        <div class="header-info">
            <h1>AgendaTIC - Administració</h1>
            <p id="current-time">18/2/2026 - 16:49:20</p>
        </div>
        <div class="user-icon" style="cursor: default;">
            ⚙️
        </div>
    </header>

    <main>
        <aside class="admin-sidebar">
            <div class="admin-branding">
                <div class="admin-avatar">AT</div>
                <div class="admin-info">
                    <span class="admin-name">AgendaTIC</span>
                    <span class="admin-role">Administració</span>
                </div>
            </div>
            
            <nav class="admin-nav">
                <button id="btn-usuaris" class="admin-btn active">
                    <span class="btn-icon">👥</span>
                    Gestió d'Usuaris
                </button>
                <button id="btn-activitats" class="admin-btn">
                    <span class="btn-icon">📅</span>
                    Activitats
                </button>
            </nav>

            <button id="btn-sortir" class="admin-btn btn-sortir">
                <span class="btn-icon">🚪</span>
                Tancar Sessió
            </button>
        </aside>

        <section class="content">
            <div id="view-usuaris" class="view-panel active">
                <iframe src="admin-usuaris.html?v=v4" width="100%" height="100%" frameborder="0"></iframe>
            </div>

            <div id="view-activitats" class="view-panel">
                <iframe src="admin-activitats.html" width="100%" height="100%" frameborder="0"></iframe>
            </div>


        </section>
    </main>

    <script src="js/clock.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
