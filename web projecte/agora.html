<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalendarPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ateca.css">
    <style>
        .calendar-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .calendar-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="calendar-wrapper">
            <iframe
                src="https://calendar.google.com/calendar/embed?src=b9f6776a6bfa51bf8224ce431d249255b9e4c19ef483f1380c4f22d86cb4f8ec%40group.calendar.google.com&ctz=Europe%2FMadrid&wkst=2&bgcolor=%23ffffff&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0"
                style="border-width:0" width="100%" height="100%" frameborder="0" scrolling="no">
            </iframe>
        </div>
    </div>
</body>

</html>
