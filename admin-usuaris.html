<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuaris - Administració</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-usuaris.css">
</head>

<body>

    <!-- Taula d'usuaris -->
    <div class="admin-panel" style="margin: 0; min-height: 90vh;">
        <div class="usuaris-header">
            <h2>Gestió d'Usuaris</h2>
            <button id="btn-add-user" class="btn-primary">+ Afegir Usuari</button>
        </div>

        <table class="usuaris-table">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Correu Electrònic</th>
                    <th>Rol</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody id="usuaris-body">
                <tr>
                    <td colspan="4" style="text-align:center; padding: 20px;">Carregant usuaris...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal Afegir Usuari -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-titol">
            <div class="modal-header">
                <h3 id="modal-titol">Afegir Nou Usuari</h3>
                <button id="btn-modal-tancar" class="modal-close" aria-label="Tancar">&times;</button>
            </div>
            <form id="form-nou-usuari" class="modal-form">
                <div class="form-group">
                    <label for="nou-nom">Nom</label>
                    <input type="text" id="nou-nom" name="nom" placeholder="Nom complet" required>
                </div>
                <div class="form-group">
                    <label for="nou-correu">Correu Electrònic</label>
                    <input type="email" id="nou-correu" name="correu" placeholder="exemple@domini.cat" required>
                </div>
                <div class="form-group">
                    <label for="nou-rol">Rol</label>
                    <select id="nou-rol" name="rol" required>
                        <option value="" disabled selected>Selecciona un rol...</option>
                        <option value="admin">Administrador</option>
                        <option value="professor">Professor</option>
                        <option value="alumne">Alumne</option>
                    </select>
                </div>
                <div class="modal-accions">
                    <button type="button" id="btn-modal-cancel" class="btn-cancel">Cancel·lar</button>
                    <button type="submit" class="btn-primary">Desar Usuari</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts externs (sense cap JS inline) -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-usuaris.js"></script>

</body>

</html>
