<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activitats - Administració</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-activitats.css">
</head>

<body>
    <div class="admin-panel" style="margin: 0; min-height: 90vh;">

        <!-- Capçalera amb els 3 botons d'acció -->
        <div class="activitats-header">
            <h2>Gestió d'Activitats</h2>
            <div class="accions-botons">
                <button id="btn-afegir"  class="btn-accio btn-afegir  active-btn" data-panel="panel-afegir">+ Afegir Activitat</button>
                <button id="btn-editar"  class="btn-accio btn-editar"              data-panel="panel-editar">✏️ Editar Activitat</button>
                <button id="btn-borrar"  class="btn-accio btn-borrar"              data-panel="panel-borrar">🗑️ Borrar Activitat</button>
            </div>
        </div>

        <!-- ======= PANEL: AFEGIR ======= -->
        <div id="panel-afegir" class="accio-panel panel-afegir active-panel">
            <div class="panel-titol">
                <span class="panel-badge badge-afegir">Nova Activitat</span>
            </div>
            <form class="activitat-form" id="form-afegir">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label for="afegir-nom">Nom de l'Activitat</label>
                        <input type="text" id="afegir-nom" placeholder="Ex: Curs de React" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="afegir-aula">Aula</label>
                        <select id="afegir-aula" required>
                            <option value="" disabled selected>Selecciona l'aula</option>
                            <option value="ATECA">Aula ATECA</option>
                            <option value="AGORA">Aula ÀGORA</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="afegir-data">Data</label>
                        <input type="date" id="afegir-data" required>
                    </div>
                    <div class="form-group">
                        <label for="afegir-hora-inici">Hora d'Inici</label>
                        <input type="time" id="afegir-hora-inici" required>
                    </div>
                    <div class="form-group">
                        <label for="afegir-hora-fi">Hora de Finalització</label>
                        <input type="time" id="afegir-hora-fi" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="afegir-responsable">Responsable</label>
                        <input type="text" id="afegir-responsable" placeholder="Nom del professor o responsable" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit btn-submit-afegir">Guardar Activitat</button>
            </form>
        </div>

        <!-- ======= PANEL: EDITAR ======= -->
        <div id="panel-editar" class="accio-panel panel-editar">
            <div class="panel-titol">
                <span class="panel-badge badge-editar">Editar Activitat</span>
            </div>
            <form class="activitat-form form-editar" id="form-editar">
                <!-- Fila 1: Selecció + Nom + Aula -->
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label for="editar-id">Activitat</label>
                        <select id="editar-id" required>
                            <option value="" disabled selected>Selecciona...</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label for="editar-nom">Nom</label>
                        <input type="text" id="editar-nom" placeholder="Nom de l'activitat" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="editar-aula">Aula</label>
                        <select id="editar-aula" required>
                            <option value="" disabled selected>Selecciona</option>
                            <option value="ATECA">Aula ATECA</option>
                            <option value="AGORA">Aula ÀGORA</option>
                        </select>
                    </div>
                </div>
                <!-- Fila 2: Data + Hora inici + Hora fi + Responsable -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="editar-data">Data</label>
                        <input type="date" id="editar-data" required>
                    </div>
                    <div class="form-group">
                        <label for="editar-hora-inici">Inici</label>
                        <input type="time" id="editar-hora-inici" required>
                    </div>
                    <div class="form-group">
                        <label for="editar-hora-fi">Fi</label>
                        <input type="time" id="editar-hora-fi" required>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label for="editar-responsable">Responsable</label>
                        <input type="text" id="editar-responsable" placeholder="Nom del responsable" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit btn-submit-editar">Guardar Canvis</button>
            </form>
        </div>

        <!-- ======= PANEL: BORRAR ======= -->
        <div id="panel-borrar" class="accio-panel panel-borrar">
            <div class="panel-titol">
                <span class="panel-badge badge-borrar">Borrar Activitat</span>
            </div>
            <div class="activitat-form form-borrar">
                <div class="form-row">
                    <div class="form-group">
                        <label for="borrar-id">Selecciona l'Activitat a Borrar</label>
                        <select id="borrar-id" required>
                            <option value="" disabled selected>Carregant activitats...</option>
                        </select>
                    </div>
                </div>

                <div class="borrar-confirmacio" id="borrar-preview">
                    <div class="borrar-icona">🗑️</div>
                    <p class="borrar-text">
                        Selecciona una activitat de la llista per veure la informació i confirmar que la vols eliminar.
                    </p>
                </div>

                <button type="button" id="btn-confirmar-borrar" class="btn-submit btn-submit-borrar" disabled>
                    Confirmar Eliminació
                </button>
            </div>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-activitats.js"></script>
</body>

</html>
