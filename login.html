<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="google-client-id" content="1042880725485-1pnfjrkd3m89b7pq3gjpad1g5lt3k0hh.apps.googleusercontent.com">
    <title>AgendaTIC · Inicia sessió</title>

    <!-- Estils del login -->
    <link rel="stylesheet" href="./css/main/login.css">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div class="login-bg">
        <div class="login-card">
            <a href="index.html" class="back-link">← Tornar a l'inici</a>

            <div class="login-logo">
                <div class="logo-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
            </div>

            <h1 class="login-title">AgendaTIC</h1>
            <p class="login-subtitle">Panell d'Administració</p>
            <p class="login-instruction">
                Inicia sessió amb el teu compte de Google per accedir al panell d'administració.
            </p>

            <div id="google-signin-btn" class="google-btn-wrapper"></div>

            <p id="login-loading" class="login-loading" style="display:none;">
                <span class="spinner"></span> Verificant credencials...
            </p>
            <p id="login-error" class="login-error" style="display:none;">
                ⚠ No tens permisos d'administrador. Contacta amb el suport.
            </p>

            <p class="login-footer">
                Només els usuaris autoritzats poden accedir a aquesta àrea.
            </p>
        </div>
    </div>

    <!-- Lògica del login -->
    <script src="js/pages/login.js"></script>

</body>

</html>
