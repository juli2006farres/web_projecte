<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgendaTIC · Sales Àgora i Ateca</title>

    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />

    <!-- Estils propis -->
    <link rel="stylesheet" href="./css/main/styles.css">
</head>
<body>

<header>
    <div class="header-info">
        <h1 id="header-title">AgendaTIC</h1>
        <p id="current-time">Carregant hora...</p>
    </div>
    <div class="header-right">
        <div class="room-badge" id="active-room-badge">Selecciona una sala</div>
        <a href="login.html" class="login-link-btn" id="login-link-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            <span>Iniciar sessió</span>
        </a>
    </div>
</header>

<main>
    <!-- Sidebar amb botons de sales -->
    <aside id="sidebar-menu">
        <div id="loading-sales">Carregant sales...</div>
    </aside>

    <!-- Contingut principal dinàmic -->
    <section class="content">
        <!-- Vista inicial (home) -->
        <div id="view-home" class="view-panel active">
            <img src="img/aula.png" alt="Aula TIC">
            <p style="margin-top: 20px; font-size: 1.8rem; color: #334155;">Benvingut a l'AgendaTIC</p>
            <p style="font-size: 1.2rem; color: #64748b;">Selecciona una sala per veure'n la disponibilitat</p>
        </div>

        <!-- Panells per a cada sala (s'injecten dinàmicament) -->
        <div id="dynamic-views"></div>
    </section>
</main>

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<!-- Lògica de l'aplicació -->
<script src="js/pages/main.js"></script>

</body>
</html>
