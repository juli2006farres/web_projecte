<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaTIC</title>
    <!-- CSS enllaçat de la nova carpeta -->
    <link rel="stylesheet" href="css/main/styles.css">
    <script>
        // Aplicar preferències (color i nom) abans de renderitzar
        const savedColor = localStorage.getItem('pref_color');
        if (savedColor) {
            document.documentElement.style.setProperty('--color-primary', savedColor);
        }
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('pref_nom');
            if (savedName) {
                const h1 = document.querySelector('header h1');
                if (h1) h1.textContent = savedName;
            }
        });
    </script>
    <script src="js/core/config.js?v=v2"></script>
    <script src="js/core/auth.js?v=v2"></script>
</head>

<body>
    <header>
        <div class="header-info">
            <h1>AgendaTIC</h1>
            <p id="current-time">18/2/2026 - 16:49:20</p>
        </div>
        <a href="login.html" class="user-icon" style="text-decoration: none; color: black;">
            👤
        </a>
    </header>

    <main>
        <aside>
            <button id="btn-ateca" class="btn-ateca">ATECA</button>
            <button id="btn-agora" class="btn-agora">AGORA</button>
        </aside>

        <section class="content">
            <div id="view-home" class="view-panel active">
                <img src="img/consejos-imagenes.jpg" alt="Aula">
            </div>

            <div id="view-agora" class="view-panel">
                <iframe src="agora.html" width="100%" height="100%" frameborder="0"></iframe>
            </div>

            <div id="view-ateca" class="view-panel">
                <iframe src="ateca.html" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </section>
    </main>

    <!-- JS enllaçat des de la nova carpeta js -->
    <script src="js/pages/main.js"></script>
    <script src="js/core/clock.js"></script>
</body>

</html>
