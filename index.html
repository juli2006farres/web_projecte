<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaTIC</title>
    
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
    
    <!-- El teu CSS principal -->
    <link rel="stylesheet" href="css/main/styles.css">
    
    <script>
        // Aplicar preferències (color i nom) abans de renderitzar
        const savedColor = localStorage.getItem('pref_color');
        if (savedColor) {
            document.documentElement.style.setProperty('--color-primary', savedColor);
        }
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('pref_nom');
            if (savedName) {
                const h1 = document.querySelector('header h1');
                if (h1) h1.textContent = savedName;
            }
        });
    </script>
    <script src="js/core/config.js?v=v2"></script>
    <script src="js/core/auth.js?v=v2"></script>
</head>

<body>
    <header>
        <div class="header-info">
            <h1>AgendaTIC</h1>
            <p id="current-time">18/2/2026 - 16:49:20</p>
        </div>
    </header>

    <main>
        <aside id="sidebar-menu">
            <div id="loading-sales" style="color: #666; text-align: center; padding: 20px; width: 100%;">Carregant sales...</div>
        </aside>

        <section class="content">
            <div id="view-home" class="view-panel active">
                <img src="img/consejos-imagenes.jpg" alt="Aula">
            </div>
            <!-- Els calendaris de cada sala s'injectaran aquí dinàmicament -->
        </section>
    </main>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    
    <!-- Els teus scripts -->
    <script src="js/pages/main.js"></script>
    <script src="js/core/clock.js"></script>
</body>

</html>
